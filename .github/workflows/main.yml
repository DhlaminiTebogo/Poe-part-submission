name: .NET CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ConsoleApp1/ConsoleApp1.csproj

      - name: Build
        run: dotnet build ConsoleApp1/ConsoleApp1.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ConsoleApp1/ConsoleApp1.csproj --no-build --configuration Release --verbosity normal

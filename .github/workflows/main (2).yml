name: .NET CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore main project
        run: dotnet restore ChatBot/ConsoleApp1/ConsoleApp1.csproj /p:EnableWindowsTargeting=true

      - name: Build main project
        run: dotnet build ChatBot/ConsoleApp1/ConsoleApp1.csproj --no-restore --configuration Release /p:EnableWindowsTargeting=true

      - name: Restore test project
        run: dotnet restore ConsoleApp1.Test/ConsoleApp1.Test.csproj /p:EnableWindowsTargeting=true

      - name: Run tests
        run: dotnet test ConsoleApp1.Test/ConsoleApp1.Test.csproj --configuration Release --verbosity normal /p:EnableWindowsTargeting=true